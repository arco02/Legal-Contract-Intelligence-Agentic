spring.application.name=legal-rag-assistant
server.port=8080


#server.servlet.context-path=

#Neon PostgreSQL with pgvector
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

#JPA-Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

#JWT
jwt.secret=${JWT_SECRET}
jwt.expiry-ms=${JWT_EXPIRY_MS:86400000}

#GROQ
groq.api-key=${GROQ_API_KEY}
groq.base-url=${GROQ_BASE_URL:https://api.groq.com/openai/v1}
groq.model.main=${GROQ_MODEL_MAIN:llama-3.3-70b-versatile}
groq.model.fast=${GROQ_MODEL_FAST:openai/gpt-oss-120b}
groq.temperature.main=0.1
groq.temperature.fast=0.0
groq.max-tokens=1500

#TAVILY SEARCH
tavily.api-key=${TAVILY_API_KEY}
tavily.base-url=${TAVILY_BASE_URL:https://api.tavily.com/search}
tavily.result-count=3
tavily.search-depth=basic

#PYTHON INGESTION
python.service.url=${PYTHON_SERVICE_URL}
python.service.ingest-path=/ingest
python.service.ingest-law-path=/ingest-law
python.service.connect-timeout-ms=10000
python.service.read-timeout-ms=120000

#RETRIEVAL PARAMETERS
rag.similarity-threshold=0.40
rag.contract-chunks-limit=5
rag.law-chunks-limit=3
rag.conversation-history-turns=3

#FILE UPLOAD
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# LOGGING
logging.level.root=INFO
logging.level.com.legalrag=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

#CORS — allowed origins (override per environment)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

#SPRING PROFILES
spring.profiles.active=dev
